<!DOCTYPE html>
<html>
<head>
  <title>Generate Extension Icons</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 2rem; background: #f5f5f5; }
    h1 { margin-bottom: 1rem; }
    .icons { display: flex; gap: 2rem; flex-wrap: wrap; margin-top: 2rem; }
    .icon-item { text-align: center; background: white; padding: 1rem; border-radius: 8px; }
    canvas { display: block; margin: 0 auto 0.5rem; }
    button { padding: 0.5rem 1rem; cursor: pointer; margin-top: 0.5rem; }
    .instructions { background: #e8f4fd; padding: 1rem; border-radius: 8px; margin-bottom: 2rem; }
  </style>
</head>
<body>
  <h1>Extension Icon Generator</h1>
  <div class="instructions">
    <strong>Instructions:</strong> Click each "Download" button to save the icon, then place them in the icons folder.
  </div>
  <div class="icons" id="icons"></div>

  <script>
    const sizes = [16, 48, 128];
    const container = document.getElementById('icons');

    sizes.forEach(size => {
      const div = document.createElement('div');
      div.className = 'icon-item';

      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Create gradient
      const gradient = ctx.createLinearGradient(0, size, size, 0);
      gradient.addColorStop(0, '#f09433');
      gradient.addColorStop(0.25, '#e6683c');
      gradient.addColorStop(0.5, '#dc2743');
      gradient.addColorStop(0.75, '#cc2366');
      gradient.addColorStop(1, '#bc1888');

      // Draw rounded rectangle
      const radius = size * 0.22;
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();

      // Draw camera circle
      const centerX = size / 2;
      const centerY = size / 2;
      const circleRadius = size * 0.22;
      ctx.beginPath();
      ctx.arc(centerX, centerY, circleRadius, 0, Math.PI * 2);
      ctx.strokeStyle = 'white';
      ctx.lineWidth = size * 0.06;
      ctx.stroke();

      // Draw flash dot
      const dotRadius = size * 0.05;
      const dotX = size * 0.72;
      const dotY = size * 0.28;
      ctx.beginPath();
      ctx.arc(dotX, dotY, dotRadius, 0, Math.PI * 2);
      ctx.fillStyle = 'white';
      ctx.fill();

      const label = document.createElement('p');
      label.textContent = `${size}x${size}`;

      const button = document.createElement('button');
      button.textContent = 'Download';
      button.onclick = () => {
        const link = document.createElement('a');
        link.download = `icon${size}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      };

      div.appendChild(canvas);
      div.appendChild(label);
      div.appendChild(button);
      container.appendChild(div);
    });
  </script>
</body>
</html>
