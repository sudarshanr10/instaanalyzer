<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      font-family: 'Outfit', -apple-system, sans-serif;
      background: #08080c;
      color: #f0f0f5;
      overflow: hidden;
    }

    .container {
      padding: 24px;
      position: relative;
    }

    /* Background effect */
    .bg-glow {
      position: absolute;
      top: -100px;
      right: -100px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(220, 39, 67, 0.3), transparent);
      filter: blur(60px);
      pointer-events: none;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(220, 39, 67, 0.3);
    }

    .logo-icon svg {
      width: 24px;
      height: 24px;
      color: white;
    }

    .logo-text h1 {
      font-size: 18px;
      font-weight: 700;
    }

    .logo-text span {
      font-size: 11px;
      color: #8888a0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Status */
    .status {
      padding: 14px 16px;
      background: rgba(20, 20, 30, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #8888a0;
      position: relative;
      z-index: 1;
    }

    .status.loading {
      background: rgba(0, 212, 255, 0.1);
      border-color: rgba(0, 212, 255, 0.2);
      color: #00d4ff;
    }

    .status.success {
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    .status.error {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    .status.has-data {
      background: rgba(168, 85, 247, 0.1);
      border-color: rgba(168, 85, 247, 0.2);
      color: #a855f7;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
      position: relative;
      z-index: 1;
    }

    .btn-primary {
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      color: white;
      box-shadow: 0 4px 16px rgba(220, 39, 67, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(220, 39, 67, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: rgba(20, 20, 30, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f0f0f5;
      margin-top: 10px;
    }

    .btn-secondary:hover {
      background: rgba(30, 30, 45, 0.8);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .btn svg {
      width: 18px;
      height: 18px;
    }

    /* Progress */
    .progress {
      margin-top: 16px;
      display: none;
      position: relative;
      z-index: 1;
    }

    .progress.visible {
      display: block;
    }

    .progress-bar {
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #a855f7);
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 3px;
    }

    .progress-text {
      font-size: 12px;
      color: #8888a0;
      margin-top: 8px;
      text-align: center;
    }

    /* Stats preview */
    .stats-preview {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .stat-item {
      padding: 12px;
      background: rgba(20, 20, 30, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      text-align: center;
    }

    .stat-item .value {
      font-size: 20px;
      font-weight: 700;
      color: #00d4ff;
    }

    .stat-item .label {
      font-size: 11px;
      color: #8888a0;
      margin-top: 2px;
    }

    .stat-item.warning .value { color: #ff6b6b; }
    .stat-item.success .value { color: #22c55e; }

    /* Footer */
    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 11px;
      color: #55556a;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="bg-glow"></div>

    <div class="header">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"></line>
          <line x1="12" y1="20" x2="12" y2="4"></line>
          <line x1="6" y1="20" x2="6" y2="14"></line>
        </svg>
      </div>
      <div class="logo-text">
        <h1>InstaAnalyzer</h1>
        <span>Follower Intelligence</span>
      </div>
    </div>

    <div class="status" id="status">
      Make sure you're on Instagram and logged in.
    </div>

    <div class="stats-preview" id="statsPreview" style="display: none;">
      <div class="stat-item">
        <div class="value" id="previewFollowers">0</div>
        <div class="label">Followers</div>
      </div>
      <div class="stat-item">
        <div class="value" id="previewFollowing">0</div>
        <div class="label">Following</div>
      </div>
      <div class="stat-item warning">
        <div class="value" id="previewDontFollow">0</div>
        <div class="label">Don't Follow Back</div>
      </div>
      <div class="stat-item success">
        <div class="value" id="previewMutuals">0</div>
        <div class="label">Mutuals</div>
      </div>
    </div>

    <button class="btn btn-primary" id="analyzeBtn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      Analyze My Followers
    </button>

    <button class="btn btn-secondary" id="dashboardBtn" style="display: none;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="9"></rect>
        <rect x="14" y="3" width="7" height="5"></rect>
        <rect x="14" y="12" width="7" height="9"></rect>
        <rect x="3" y="16" width="7" height="5"></rect>
      </svg>
      Open Dashboard
    </button>

    <div class="progress" id="progress">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p class="progress-text" id="progressText">Starting...</p>
    </div>

    <div class="footer">
      All data stays in your browser. Nothing sent externally.
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
