<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Follower Analysis</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #0095f6;
      --primary-hover: #0081d6;
      --background-color: #fafafa;
      --text-color: #262626;
      --text-secondary: #666;
      --border-color: #dbdbdb;
      --card-background: #ffffff;
      --success-color: #22c55e;
      --warning-color: #f59e0b;
      --info-color: #3b82f6;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .dark-mode {
      --background-color: #121212;
      --text-color: #e4e6eb;
      --text-secondary: #b0b3b8;
      --border-color: #3a3b3c;
      --card-background: #1e1e1e;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--background-color);
      color: var(--text-color);
      line-height: 1.6;
      transition: all 0.2s;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border-color);
    }

    h1 { font-size: 1.75rem; font-weight: 700; }
    .subtitle { color: var(--text-secondary); font-size: 0.875rem; }

    .theme-toggle {
      background: var(--card-background);
      border: 1px solid var(--border-color);
      border-radius: 50%;
      width: 44px; height: 44px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-color);
    }

    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--card-background);
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: var(--shadow);
      text-align: center;
      border: 1px solid var(--border-color);
    }

    .stat-card h3 { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .stat-card p { font-size: 2rem; font-weight: 700; }
    .stat-card.warning p { color: var(--warning-color); }
    .stat-card.info p { color: var(--info-color); }
    .stat-card.success p { color: var(--success-color); }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .tab {
      padding: 0.75rem 1.25rem;
      background: var(--card-background);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .tab:hover { border-color: var(--primary-color); }
    .tab.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }

    .list-container {
      background: var(--card-background);
      border-radius: 12px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border-color);
      overflow: hidden;
    }

    .list-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .search-input {
      padding: 0.625rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 0.875rem;
      background: var(--background-color);
      color: var(--text-color);
      min-width: 200px;
    }

    .search-input:focus { outline: none; border-color: var(--primary-color); }

    .export-btn {
      padding: 0.625rem 1rem;
      background: var(--card-background);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
      color: var(--text-color);
    }

    .export-btn:hover { background: var(--background-color); }

    .user-list { max-height: 500px; overflow-y: auto; }

    .user-item {
      display: flex;
      align-items: center;
      padding: 0.875rem 1.5rem;
      border-bottom: 1px solid var(--border-color);
      gap: 1rem;
      transition: background 0.2s;
    }

    .user-item:hover { background: var(--background-color); }
    .user-item:last-child { border-bottom: none; }

    .user-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--border-color);
    }

    .user-info { flex: 1; }
    .user-username { font-weight: 600; color: var(--text-color); text-decoration: none; }
    .user-username:hover { color: var(--primary-color); }
    .user-fullname { font-size: 0.875rem; color: var(--text-secondary); }

    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--text-secondary);
    }

    .empty { padding: 3rem; text-align: center; color: var(--text-secondary); }

    @media (max-width: 768px) {
      .container { padding: 1rem; }
      .stats-container { grid-template-columns: repeat(2, 1fr); }
      .list-header { flex-direction: column; align-items: stretch; }
      .search-input { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Follower Analysis</h1>
        <p class="subtitle">Results from your Instagram account</p>
      </div>
      <button class="theme-toggle" id="themeToggle">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </header>

    <div class="stats-container">
      <div class="stat-card">
        <h3>Followers</h3>
        <p id="followersCount">0</p>
      </div>
      <div class="stat-card">
        <h3>Following</h3>
        <p id="followingCount">0</p>
      </div>
      <div class="stat-card warning">
        <h3>Don't Follow Back</h3>
        <p id="dontFollowBackCount">0</p>
      </div>
      <div class="stat-card info">
        <h3>You Don't Follow</h3>
        <p id="iDontFollowBackCount">0</p>
      </div>
      <div class="stat-card success">
        <h3>Mutuals</h3>
        <p id="mutualsCount">0</p>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="dontFollowBack">Don't Follow Back</button>
      <button class="tab" data-tab="iDontFollowBack">You Don't Follow</button>
      <button class="tab" data-tab="mutuals">Mutuals</button>
      <button class="tab" data-tab="followers">All Followers</button>
      <button class="tab" data-tab="following">All Following</button>
    </div>

    <div class="list-container">
      <div class="list-header">
        <input type="text" class="search-input" id="searchInput" placeholder="Search by username...">
        <div>
          <button class="export-btn" id="exportCSV">Export CSV</button>
          <button class="export-btn" id="exportJSON">Export JSON</button>
        </div>
      </div>
      <div class="user-list" id="userList">
        <div class="loading">Loading data...</div>
      </div>
    </div>
  </div>

  <script src="analyzer.js"></script>
</body>
</html>
